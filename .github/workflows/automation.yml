name: Automatisation contenu (V1)

# Déclenchement MANUEL uniquement. Aucune publication automatique.
on:
  workflow_dispatch:
    inputs:
      generate_count:
        description: "Nombre d'idées (les mieux notées) pour lesquelles générer des brouillons"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  content-automation:
    runs-on: ubuntu-latest

    # Variables d'environnement propagées à TOUTES les étapes du job.
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-small-latest' }}
      MISTRAL_RESEARCH_MODEL: ${{ vars.MISTRAL_RESEARCH_MODEL || 'mistral-small-latest' }}
      MISTRAL_GUIDE_MODEL: ${{ vars.MISTRAL_GUIDE_MODEL || 'mistral-medium-latest' }}
      GENERATE_COUNT: ${{ github.event.inputs.generate_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1) Recherche web structurée (Mistral web_search -> modèle -> hors-ligne).
      - name: Research (Mistral web_search)
        id: research
        continue-on-error: true
        run: node automation/research.mjs

      # 2) Génération de brouillons (draft: true) à partir de la recherche.
      - name: Generate drafts (Mistral)
        id: generate
        continue-on-error: true
        run: node automation/generate.mjs

      # 3) Relecture qualité des brouillons (note /10, statut, points faibles).
      - name: Review drafts
        id: review
        continue-on-error: true
        run: node automation/review.mjs

      # 4) Build du site statique (ne dépend pas des brouillons).
      - name: Build site
        id: build
        continue-on-error: true
        run: npm run build

      # 5) Brouillons + recherche + résumé + review disponibles en artefact (jamais committés).
      - name: Upload drafts & summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-output
          path: |
            automation/research/**
            automation/drafts/**
            automation/output/**
          if-no-files-found: ignore
          retention-days: 14

      # 6) Notification Discord (recherche, modèles, review, fichiers, erreurs, build).
      - name: Notify Discord
        if: always()
        env:
          BUILD_STATUS: ${{ steps.build.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node automation/notify.mjs

      # 7) Si le build a échoué, marquer le job en échec (après la notif).
      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "Le build a échoué."
          exit 1
