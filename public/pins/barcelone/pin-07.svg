<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fond principal -->
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <rect width="1000" height="1500" fill="url(#glow)"/>

  <!-- Éléments décoratifs -->
  <circle cx="850" cy="200" r="180" fill="#818cf8" opacity="0.08"/>
  <circle cx="150" cy="1300" r="220" fill="#34d399" opacity="0.06"/>
  <rect x="70" y="440" width="860" height="520" rx="32" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Logo & branding (haut) -->
  <rect x="70" y="70" width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.15"/>
  <text x="110" y="100" font-size="22" font-weight="700" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" opacity="0.95">TripPilot</text>

  <!-- Destination badge -->
  <rect x="70" y="160" width="312" height="64" rx="32" fill="url(#accent)" opacity="0.9"/>
  <text x="100" y="202" font-size="36" font-weight="800" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif">Barcelone</text>

  <!-- Texte principal (overlay) -->
  <text x="500" y="620" font-size="82" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Barcelone de nuit</text>
<text x="500" y="720" font-size="82" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">: les rues où</text>
<text x="500" y="820" font-size="82" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">sortir</text>

  <!-- Séparateur -->
  <rect x="380" y="980" width="240" height="5" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Sous-titre -->
  <text x="500" y="1080" font-size="32" font-weight="600" fill="#f1f5f9" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Barcelone de nuit : les rues</text>
<text x="500" y="1124" font-size="32" font-weight="600" fill="#f1f5f9" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">où sortir sans danger (même</text>

  <!-- Footer -->
  <rect x="70" y="1280" width="860" height="140" rx="24" fill="#ffffff" fill-opacity="0.08"/>
  <text x="500" y="1340" font-size="28" font-weight="700" fill="#e0e7ff" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Itinéraire · Budget · Checklist</text>
  <text x="500" y="1388" font-size="22" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">https://www.trippilotguides.com/blog/barcelone</text>
</svg>